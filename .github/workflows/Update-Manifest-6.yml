name: Sync Manifest 6

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write
  workflows: write

jobs:
  sync-process:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Current Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.API_TOKEN }}
          fetch-depth: 0

      - name: Setup Git Config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync and Push
        env:
          GH_TOKEN: ${{ secrets.MY_TOKEN }}
          PUBLIC_REPO: ${{ secrets.REPO_MANUAL }}
          TARGET_REPO_PATH: ${{ secrets.REPO_MY }}
        run: |
          START_TIME=$(date +%s)
          TIMEOUT=17400 # 4 jam 50 menit

          echo "Fetching branches from $PUBLIC_REPO..."
          gh api repos/$PUBLIC_REPO/branches --paginate --jq '.[].name' > public_branches.txt

          git remote add target_repo "https://x-access-token:${GH_TOKEN}@github.com/${TARGET_REPO_PATH}.git"
          git fetch target_repo --prune

          git branch -r | grep "target_repo/" | sed 's/target_repo\///' | tr -d ' ' | grep -v "HEAD" > existing_branches.txt

          while IFS= read -r BRANCH; do
            # Cek Durasi
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "Waktu hampir habis. Memicu ulang workflow..."
              gh workflow run "Sync Manifest 6"
              exit 0
            fi

            [[ -z "$BRANCH" || "$BRANCH" == "main" || "$BRANCH" == "master" ]] && continue
            
            if grep -qx "$BRANCH" existing_branches.txt; then 
              echo "Skip: $BRANCH sudah ada di target."
              continue
            fi

            echo "--------------------------------------"
            echo "Processing Branch: $BRANCH"
            
            TEMP_DIR="temp_$BRANCH"
            mkdir -p "$TEMP_DIR"

            FILES=$(gh api "repos/$PUBLIC_REPO/contents/" -F ref="$BRANCH" \
              --jq '.[] | select(.name | endswith(".lua") or endswith(".manifest")) | .name' || echo "")

            if [ -z "$FILES" ]; then
              echo "Info: Tidak ada file target di branch $BRANCH"
              rm -rf "$TEMP_DIR"
              continue
            fi

            DOWNLOAD_COUNT=0
            for FILE in $FILES; do
              FILE_URL="https://raw.githubusercontent.com/$PUBLIC_REPO/$BRANCH/$FILE"
              # Gunakan -f agar curl gagal jika HTTP status bukan 2xx
              if curl -s -L -f -o "$TEMP_DIR/$FILE" "$FILE_URL"; then
                echo "Downloaded: $FILE"
                DOWNLOAD_COUNT=$((DOWNLOAD_COUNT+1))
              fi
            done

            if [ $DOWNLOAD_COUNT -gt 0 ]; then
              git checkout main -f
              git checkout --orphan "$BRANCH"
              git rm -rf . --quiet
              
              mv "$TEMP_DIR"/* .
              git add .
              
              if git commit -m "Add files for $BRANCH" --quiet; then
                git push target_repo "$BRANCH" --force
                echo "Berhasil Push: $BRANCH ($DOWNLOAD_COUNT file)"
              fi
            fi
            
            git checkout main -f
            git branch -D "$BRANCH" || true # Hapus branch lokal sementara
            rm -rf "$TEMP_DIR"
            
          done < public_branches.txt
