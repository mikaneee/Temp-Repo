name: Sync Manifest 6

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  sync-process:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Current Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.API_TOKEN }}
          fetch-depth: 0

      - name: Setup Git Config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync and Push
        env:
          GH_TOKEN: ${{ secrets.API_TOKEN }}
          PUBLIC_REPO: ${{ secrets.REPO_MANUAL }}
          MAIN_REPO: ${{ secrets.REPO_MY }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          START_TIME=$(date +%s)
          # Batas 5 jam = 18000 detik (kita beri buffer 10 menit jadi 17400)
          MAX_DURATION=17400 

          gh api repos/$PUBLIC_REPO/branches --paginate --jq '.[].name' > /tmp/public_branches.txt
          
          git remote add target_repo "https://x-access-token:${API_TOKEN}@github.com/${MAIN_REPO}.git"
          git fetch target_repo --prune
          git branch -r | grep "target_repo/" | sed 's/target_repo\///' | tr -d ' ' | grep -v "HEAD" > /tmp/existing_branches.txt

          NEW_BRANCH_FOUND=false

          while IFS= read -r BRANCH; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            
            if [ $ELAPSED -gt $MAX_DURATION ]; then
              echo "Waktu hampir habis (5 jam). Memicu workflow baru..."
              gh workflow run "${{ github.workflow }}"
              exit 0
            fi

            if [ -z "$BRANCH" ] || [ "$BRANCH" == "main" ]; then continue; fi
            
            if grep -qx "$BRANCH" /tmp/existing_branches.txt; then 
              continue; 
            fi

            NEW_BRANCH_FOUND=true
            echo "Processing Branch: $BRANCH"
            
            TEMP_DIR="temp_$BRANCH"
            mkdir -p "$TEMP_DIR"

            gh api repos/$PUBLIC_REPO/contents/?ref=$BRANCH --jq '.[] | select(.name | endswith(".lua") or endswith(".manifest")) | .name' > /tmp/files_to_download.txt

            if [ ! -s /tmp/files_to_download.txt ]; then
              rm -rf "$TEMP_DIR"
              continue
            fi

            DOWNLOAD_SUCCESS=false
            while IFS= read -r FILE_NAME; do
              FILE_URL="https://raw.githubusercontent.com/$PUBLIC_REPO/$BRANCH/$FILE_NAME"
              HTTP_STATUS=$(curl -s -L -o "$TEMP_DIR/$FILE_NAME" -w "%{http_code}" "$FILE_URL")
              [ "$HTTP_STATUS" -eq 200 ] && DOWNLOAD_SUCCESS=true
            done < /tmp/files_to_download.txt

            if [ "$DOWNLOAD_SUCCESS" = true ]; then
              git checkout --orphan "$BRANCH"
              git rm -rf . --quiet
              mv "$TEMP_DIR"/* .
              
              find . -name "*.lua" -o -name "*.manifest" | xargs -r git add
              
              git commit -m "Sync $BRANCH" --quiet
              git push target_repo "$BRANCH" --force
              echo "Berhasil Push: $BRANCH"
            fi
            
            git checkout main -f
            rm -rf "$TEMP_DIR"
            
          done < /tmp/public_branches.txt

          if [ "$NEW_BRANCH_FOUND" = false ]; then
            echo "Semua branch sudah sinkron. Tidak ada branch baru. Berhenti."
          fi
