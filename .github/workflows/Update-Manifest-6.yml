name: Sync Manifest 6

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  sync-process:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Current Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.API_TOKEN }}
          fetch-depth: 0

      - name: Setup Git Config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync and Push
        env:
          GH_TOKEN: ${{ secrets.API_TOKEN }}
          PUBLIC_REPO: ${{ secrets.REPO_MANUAL }}
          MAIN_REPO: ${{ secrets.REPO_MY }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          gh api repos/$PUBLIC_REPO/branches --paginate --jq '.[].name' > public_branches.txt

          git remote add target_repo "https://x-access-token:${API_TOKEN}@github.com/${MAIN_REPO}.git"
          git fetch target_repo --prune
          git branch -r | grep "target_repo/" | sed 's/target_repo\///' | tr -d ' ' | grep -v "HEAD" > existing_branches.txt

          LIMIT=10
          COUNT=0
          
          while IFS= read -r BRANCH; do
            if [ -z "$BRANCH" ] || [ "$BRANCH" == "main" ] || [ $COUNT -ge $LIMIT ]; then continue; fi
            
            if grep -qx "$BRANCH" existing_branches.txt; then 
              echo "Skip: $BRANCH sudah ada."
              continue; 
            fi

            echo "--------------------------------------------"
            echo "Processing Branch: $BRANCH"
            
            TEMP_DIR="temp_$BRANCH"
            mkdir -p "$TEMP_DIR"

            gh api repos/$PUBLIC_REPO/contents/?ref=$BRANCH --jq '.[] | select(.name | endswith(".lua") or endswith(".manifest")) | .name' > files_to_download.txt

            if [ ! -s files_to_download.txt ]; then
              echo "Tidak ada file .lua atau .manifest di branch $BRANCH"
              rm -rf "$TEMP_DIR"
              continue
            fi

            DOWNLOAD_SUCCESS=false
            while IFS= read -r FILE_NAME; do
              FILE_URL="https://raw.githubusercontent.com/$PUBLIC_REPO/$BRANCH/$FILE_NAME"
              HTTP_STATUS=$(curl -s -L -o "$TEMP_DIR/$FILE_NAME" -w "%{http_code}" "$FILE_URL")
              
              if [ "$HTTP_STATUS" -eq 200 ]; then
                echo "Downloaded: $FILE_NAME"
                DOWNLOAD_SUCCESS=true
              else
                echo "Gagal download: $FILE_NAME (Status: $HTTP_STATUS)"
              fi
            done < files_to_download.txt

            if [ "$DOWNLOAD_SUCCESS" = true ]; then
              # Buat branch baru orphan
              git checkout --orphan "$BRANCH"
              git rm -rf . --quiet
              
              mv "$TEMP_DIR"/* .
              
              git add .
              git commit -m "Add files for $BRANCH" --quiet
              git push target_repo "$BRANCH" --force
              
              COUNT=$((COUNT+1))
              echo "Berhasil Push Branch: $BRANCH"
            fi
            
            git checkout main -f
            rm -rf "$TEMP_DIR"
            
          done < public_branches.txt
