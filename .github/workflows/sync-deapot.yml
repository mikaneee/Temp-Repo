name: Sync Deapot

on:
  workflow_dispatch:

jobs:
  sync-process:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Environment
        run: |
          sudo apt-get install jq zip -y
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run 5 Hours Sync Loop
        env:
          GITHUB_TOKEN: ${{ secrets.API_TOKEN }}
          SOURCE_REPO: ${{ secrets.REPO_MY }}
          DEST_REPO: ${{ secrets.REPO_DEAPOT }}
          DEST_BRANCH: "data-deapot"
        run: |
          START_TIME=$(date +%s)
          LIMIT=$((5 * 3600)) # 5 Jam

          while true; do
            CURRENT_TIME=$(date +%s)
            if [ $((CURRENT_TIME - START_TIME)) -ge $LIMIT ]; then
              echo "Batas 5 jam tercapai. Restarting..."
              break
            fi

            echo "--- Memulai Scan Branch ---"
            
            SOURCE_BRANCHES=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$SOURCE_REPO/branches?per_page=100" | jq -r '.[].name' | grep -E '^[0-9]+$')

            rm -rf dest_folder
            git clone --depth 1 --branch $DEST_BRANCH https://$GITHUB_TOKEN@github.com/$DEST_REPO.git dest_folder
            
            NEW_DATA=false
            cd dest_folder

            for id in $SOURCE_BRANCHES; do
              if [ -f "$id.zip" ]; then
                continue
              fi

              echo "Processing Branch: $id (Lua + Manifests)"
              
              mkdir -p "temp_$id"
              
              curl -L -s -H "Authorization: token $GITHUB_TOKEN" \
                -o "archive_$id.zip" \
                "https://github.com/$SOURCE_REPO/archive/refs/heads/$id.zip"

              if [ -f "archive_$id.zip" ]; then
                unzip -q "archive_$id.zip" -d "temp_$id"
                
                cd "temp_$id"/* zip -j "../../$id.zip" *.lua *.manifest 2>/dev/null || zip -j "../../$id.zip" *
                cd ../../
                
                rm -rf "temp_$id" "archive_$id.zip"
                
                git add "$id.zip"
                NEW_DATA=true
              fi
            done

            if [ "$NEW_DATA" = true ]; then
              git commit -m "Auto-Update)"
              git push https://$GITHUB_TOKEN@github.com/$DEST_REPO.git $DEST_BRANCH
              echo "Berhasil push data baru."
            else
              echo "Tidak ada branch baru."
            fi

            cd ..
            echo "Menunggu 5 menit untuk iterasi berikutnya..."
            sleep 300
          done

      - name: Self Trigger Workflow
        if: always()
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.API_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/sync-deapot.yml/dispatches" \
            -d '{"ref":"main"}'
