name: Sync Deapot

on:
  workflow_dispatch:

jobs:
  sync-process:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install jq zip unzip -y
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run 5 Hours Sync Loop
        env:
          GITHUB_TOKEN: ${{ secrets.API_TOKEN }}
          SOURCE_REPO: ${{ secrets.REPO_MY }}
          DEST_REPO: ${{ secrets.REPO_DEAPOT }}
          DEST_BRANCH: "data-deapot"
        run: |
          START_TIME=$(date +%s)
          LIMIT=$((5 * 3600))

          while true; do
            if [ $(($(date +%s) - START_TIME)) -ge $LIMIT ]; then
              echo "Batas 5 jam tercapai. Berhenti..."
              break
            fi

            echo "--- Memulai Scan Branch ---"
            
            SOURCE_BRANCHES=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/repos/$SOURCE_REPO/branches?per_page=100" | jq -r '.[].name' | grep -E '^[0-9]+$')

            rm -rf repo_dir
            git clone --depth 1 --branch $DEST_BRANCH https://$GITHUB_TOKEN@github.com/$DEST_REPO.git repo_dir
            
            NEW_DATA=false
            
            ROOT_PATH=$(pwd)

            for id in $SOURCE_BRANCHES; do
              if [ -f "repo_dir/$id.zip" ]; then
                continue
              fi

              echo "Processing Branch: $id"
              
              curl -L -s -H "Authorization: token $GITHUB_TOKEN" \
                -o "raw_$id.zip" \
                "https://github.com/$SOURCE_REPO/archive/refs/heads/$id.zip"

              if [ -f "raw_$id.zip" ]; then
                mkdir -p "temp_$id"
                unzip -q "raw_$id.zip" -d "temp_$id"
                
                cd "temp_$id"/*
                zip -j "$ROOT_PATH/repo_dir/$id.zip" ./*
                cd "$ROOT_PATH"
                
                NEW_DATA=true
                
                rm -rf "temp_$id" "raw_$id.zip"
              fi
            done

            if [ "$NEW_DATA" = true ]; then
              cd repo_dir
              git add *.zip
              git commit -m "Auto-Update"
              git push https://$GITHUB_TOKEN@github.com/$DEST_REPO.git $DEST_BRANCH
              cd ..
              echo "Push berhasil."
            else
              echo "Tidak ada data baru."
            fi

          done

      - name: Self Trigger Workflow
        if: always()
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.API_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/sync-manifest.yml/dispatches" \
            -d '{"ref":"main"}'
