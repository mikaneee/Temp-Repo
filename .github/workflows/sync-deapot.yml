name: Sync Deapot

on:
  workflow_dispatch:

jobs:
  sync-process:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install jq zip unzip -y
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run 5 Hours Indexing Loop
        env:
          GITHUB_TOKEN: ${{ secrets.API_TOKEN }}
          SOURCE_REPO: ${{ secrets.REPO_MY }}
          DEST_REPO: ${{ secrets.REPO_DEAPOT }}
          DEST_BRANCH: "data-deapot"
        run: |
            gh api repos/$SOURCE_REPO/branches --paginate --jq '.[].name' | grep -E '^[0-9]+$' | sort > /tmp/source_branches.txt
            
            gh api "repos/$DEST_REPO/contents/?ref=$DEST_BRANCH" --paginate --jq '.[] | select(.name | endswith(".zip")) | .name' | sed 's/\.zip//' | sort > /tmp/existing_zips.txt
            
            DIFF=$(comm -23 /tmp/source_branches.txt /tmp/existing_zips.txt)

            if [ -z "$DIFF" ]; then
              echo "Status: Semua branch sudah tersinkron."
              sleep 2
              continue
            fi

            echo "Ditemukan branch baru untuk diproses. Memulai download..."

            rm -rf repo_dir
            git clone --depth 1 --branch $DEST_BRANCH https://$GITHUB_TOKEN@github.com/$DEST_REPO.git repo_dir
            
            NEW_COUNT=0
            for id in $DIFF; do
              if [ $(($(date +%s) - START_TIME)) -ge $LIMIT ]; then break; fi

              echo "Processing: $id"
              
              curl -L -s -H "Authorization: token $GITHUB_TOKEN" \
                -o "raw_$id.zip" \
                "https://github.com/$SOURCE_REPO/archive/refs/heads/$id.zip"

              if [ -f "raw_$id.zip" ]; then
                mkdir -p "temp_$id"
                unzip -q "raw_$id.zip" -d "temp_$id"
                
                cd "temp_$id"/*
                zip -j "$ROOT_PATH/repo_dir/$id.zip" ./*.lua ./*.manifest 2>/dev/null || zip -j "$ROOT_PATH/repo_dir/$id.zip" ./*
                cd "$ROOT_PATH"
                
                rm -rf "temp_$id" "raw_$id.zip"
                NEW_COUNT=$((NEW_COUNT + 1))

                if [ $((NEW_COUNT % 20)) -eq 0 ]; then
                  cd repo_dir
                  git add .
                  if ! git diff --cached --quiet; then
                    git commit -m "Auto-Update"
                    git push https://$GITHUB_TOKEN@github.com/$DEST_REPO.git $DEST_BRANCH
                  fi
                  cd "$ROOT_PATH"
                fi
              fi
            done

            if [ -d "repo_dir" ]; then
              cd repo_dir
              git add .
              if ! git diff --cached --quiet; then
                echo "Melakukan push batch terakhir..."
                git commit -m "Auto-Update"
                git push https://$GITHUB_TOKEN@github.com/$DEST_REPO.git $DEST_BRANCH
              else
                echo "Tidak ada perubahan fisik pada file. Skip commit."
              fi
              cd "$ROOT_PATH"
            fi
